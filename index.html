<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ORGATEK ARBOR PLANNING AREA</title>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
    font-family:Arial,Helvetica,sans-serif;
}
#map{
    width:100%;
    height:100%;
}
.title{
    position:absolute;
    top:12px;
    left:50%;
    transform:translateX(-50%);
    background:#ffffff;
    padding:10px 20px;
    border-radius:6px;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    z-index:1000;
    border:3px solid #008000;
}

.title h2{
    margin:0;
    color:#008000;
    font-size:22px;
    font-weight:bold;
}
</style>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBwJnprg61M8EWryIBQxT1_f3qxueLfQic"></script>

</head>

<body>

<div class="title">
<h2>ORGATEK-ARBOR-PLANNING AREA FOR BAMBOO</h2>
</div>

<div id="map"></div>

<script>

const map = new google.maps.Map(document.getElementById("map"),{
    center:{lat:20.5,lng:85.5},
    zoom:12,
    mapTypeId:'satellite'
});

let marker;

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function(position) {

        const userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
        };

        marker = new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "My Location",
            icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 8,
                fillColor: "#4285F4",
                fillOpacity: 1,
                strokeColor: "#FFFFFF",
                strokeWeight: 3
            }
        });

        map.setCenter(userLocation);
        map.setZoom(18);

    }, function(error){
        console.log(error);
    },{
        enableHighAccuracy:true
    });

}

const geojsonUrl="https://raw.githubusercontent.com/hemanya2003/Orgatek-Arbor/main/Orgatek_Area.geojson";

map.data.loadGeoJson(geojsonUrl,null,function(features){

    if(features.length>0){

        let bounds=new google.maps.LatLngBounds();

        features.forEach(function(feature){

            processPoints(feature.getGeometry(),bounds.extend,bounds);

        });

        map.fitBounds(bounds);

    }

});

function processPoints(geometry,callback,thisArg){

    if(geometry instanceof google.maps.LatLng){

        callback.call(thisArg,geometry);

    }else if(geometry instanceof google.maps.Data.Point){

        callback.call(thisArg,geometry.get());

    }else{

        geometry.getArray().forEach(function(g){

            processPoints(g,callback,thisArg);

        });

    }

}

map.data.setStyle({
    fillOpacity: 0,        // Hollow polygon
    strokeColor: "#00ff00",
    strokeWeight: 3,
    clickable: true
});

const infowindow=new google.maps.InfoWindow();

map.data.addListener('click',function(event){

    const p=event.feature;

    // CHANGE THESE TWO FIELD NAMES TO MATCH YOUR GEOJSON
    const village=p.getProperty("Vill_Name") || p.getProperty("VILL_NAME") || "-";
    const area=p.getProperty("AREA") || p.getProperty("Area") || p.getProperty("Area_Ha") || "-";

    const html=`
    <div style="min-width:220px;">
        <h3 style="margin:0 0 10px;color:green;">
            ORGATEK-ARBOR-PLANNING AREA
        </h3>

        <table style="border-collapse:collapse;width:100%;">
            <tr>
                <td><b>Village</b></td>
                <td>${village}</td>
            </tr>
            <tr>
                <td><b>Area</b></td>
                <td>${area}</td>
            </tr>
        </table>
    </div>
    `;

    infowindow.setContent(html);
    infowindow.setPosition(event.latLng);
    infowindow.open(map);

});

</script>

</body>
</html>
